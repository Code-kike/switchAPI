# 最小部署示例：docker compose up -d 后浏览器打开 http://<主机>:8080
# 数据（SQLite/主密钥/备份）在命名卷 switchapi-data 中，务必纳入主机备份策略。
# 如改用 bind mount（如 ./data:/data），先 `chown 1000 <目录>`（容器内非 root 运行）。
services:
  hub:
    build: .
    # 或使用发布镜像: image: ghcr.io/code-kike/switchapi-hub:latest
    ports:
      - "8080:8080"
    volumes:
      - switchapi-data:/data
    restart: unless-stopped

volumes:
  switchapi-data:
